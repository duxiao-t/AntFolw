spring:
  application:
    name: antflow-backend
  datasource:
    # Default: local PostgreSQL on 5432 (user-supplied postgres/Tao@1234).
    # Override via env: SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/antflow}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Tao@1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jackson:
    default-property-inclusion: non_null
server:
  port: ${PORT:8080}
  error:
    include-message: always
antflow:
  jwt:
    secret: ${JWT_SECRET:devsecret0123456789devsecret0123456789devsecret}
    ttl-seconds: 86400
    clock-skew-seconds: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8000}
  login:
    per-minute: 5
    per-hour: 30
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
  type-handlers-package: com.antflow.common
springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    root: INFO
    com.antflow: DEBUG
