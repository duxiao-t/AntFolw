name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Run unit tests
        run: mvn -B test
        env:
          JWT_SECRET: ci-secret-0123456789-ci-secret-0123456789-ci

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Lint (Biome)
        run: npm run biome:lint || true   # non-blocking during MVP polish
      - name: Type-check
        run: npx tsc --noEmit || true      # non-blocking during MVP wiring
      - name: Build
        run: npm run build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Bundle budget
        run: npm run check:bundle
      - name: Upload bundle budget report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-bundle-budget
          path: mobile/test-results/bundle-budget.json
          if-no-files-found: ignore
